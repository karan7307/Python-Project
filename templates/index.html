<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnout Predictor AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container animate-fade-in">
        <h1>Burnout AI</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Predict your burnout score based on daily habits.</p>
        
        <form id="predictionForm">
            <div class="form-group">
                <label for="study_hours">Study Hours (Daily)</label>
                <input type="number" id="study_hours" step="0.5" required placeholder="8">
            </div>
            
            <div class="form-group">
                <label for="stress_level">Stress Level (1-10)</label>
                <input type="number" id="stress_level" min="1" max="10" required placeholder="5">
            </div>
            
            <div class="form-group">
                <label for="sleep_hours">Sleep Hours (Daily)</label>
                <input type="number" id="sleep_hours" step="0.5" required placeholder="7">
            </div>
            
            <div class="form-group">
                <label for="extracurricular_activities">Extracurricular Activities (Hours)</label>
                <input type="number" id="extracurricular_activities" step="0.5" required placeholder="2">
            </div>
            
            <button type="submit">Analyze Burnout</button>
        </form>

        <div id="result" class="result-card">
            <div class="result-value" id="scoreValue">0%</div>
            <div class="result-label">Predicted Burnout Score</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
